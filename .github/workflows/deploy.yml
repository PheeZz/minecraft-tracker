name: Deploy to GitHub Pages

on:
  push:
    # деплой только по семвер-тегу (vMAJOR.MINOR.PATCH, в т.ч. пре-релиз vX.Y.Z-rc.1)
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-**'
  workflow_dispatch: # ручной запуск (escape hatch)

permissions:
  contents: read
  pages: write
  id-token: write

# одновременно только один деплой; новый отменяет текущий
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # нужна история, чтобы проверить принадлежность тега к main
      - name: Тег должен указывать на коммит из main
        if: github.event_name == 'push'
        run: |
          git fetch --no-tags origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "✓ Тег $GITHUB_REF_NAME ($GITHUB_SHA) принадлежит main"
          else
            echo "✗ Тег $GITHUB_REF_NAME ($GITHUB_SHA) не на ветке main — деплой прерван"
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint:check
      - run: npm test
      - run: npm run build
      - name: SPA fallback (deep-links на Pages)
        run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
