# Сборка и запуск приложения за внутренним nginx.
# Домен и TLS — на внешнем reverse-proxy/ingress; здесь только http на :80.
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # base='/' — раздаём из корня (для GitHub Pages в CI используется другой base)
        BASE_PATH: /
    image: minecraft-tracker:latest
    container_name: minecraft-tracker
    ports:
      # наружу — стандартные веб-порты. Внутренний nginx отдаёт ПЛЕЙН http на обоих;
      # TLS терминирует внешний reverse-proxy/LB (этот образ о домене/SSL не знает).
      - '80:80'
      - '443:443'
    restart: unless-stopped
