# Конфигурация внутреннего nginx: раздача собранного SPA.
# Ничего не знает о домене и SSL — это задача внешнего reverse-proxy/ingress.
server {
    # Слушаем оба порта ПЛЕЙН http (без TLS) — SSL/домен терминирует внешний
    # reverse-proxy/LB перед контейнером; внутренний nginx о них ничего не знает.
    # Только IPv4: в некоторых хостах/контейнерах IPv6 отключён, и явный listen [::]
    # уронил бы nginx ("Address family not supported by protocol").
    listen 80;
    listen 443;
    server_name _;            # любой Host — домен решает внешний прокси

    root /usr/share/nginx/html;
    index index.html;

    # на всякий случай не светим версию nginx
    server_tokens off;
    # безопасный дефолт (не зависит от домена/SSL)
    add_header X-Content-Type-Options "nosniff" always;

    # сжатие текстовых ассетов на лету
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/wasm
        font/woff2;

    # Хешированные сборочные ассеты (Vite кладёт в /assets/, имена с хешем) —
    # иммутабельный долгий кеш. ^~ чтобы префикс выигрывал у regex-правил ниже.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Статика из public/ (текстуры пчёл/деревьев, иконки) — стабильные пути,
    # умеренный кеш; отсутствие → 404 (а не SPA-фоллбэк).
    location ~* \.(?:png|jpe?g|gif|webp|svg|ico|woff2?|ttf|eot|wasm|map)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }

    # SPA-маршруты: путь без расширения (включая /, /trees, /bees) → index.html.
    # ВАЖНО: отдаём именно /index.html, НЕ проверяя $uri — иначе маршруты /trees и
    # /bees совпали бы с одноимёнными каталогами ассетов (public/trees, public/bees)
    # и nginx сделал бы 301 на /trees//bees/ вместо отдачи приложения.
    location ~ ^/[^.]*$ {
        add_header Cache-Control "no-cache" always;
        try_files /index.html =404;
    }

    # Остальное (пути с точкой, но не пойманные выше) — попытка файла, иначе SPA.
    location / {
        try_files $uri /index.html;
    }
}
