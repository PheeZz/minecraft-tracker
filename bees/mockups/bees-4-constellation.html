<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Созвездие пчёл · Соты</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --space:#070912; --space2:#0c1024; --panel:rgba(16,20,44,.86);
  --line:rgba(120,150,255,.14); --edge:#26305c;
  --cyan:#56e0e0; --ice:#8fb6ff; --mag:#e57bff; --gold:#ffd47a;
  --ink:#eaf0ff; --muted:#8e9bce; --dim:#5b6699;
  --f:#3fd6a0; --e:#ff8a5c;
  --disp:"Russo One",sans-serif; --body:"Manrope",system-ui,sans-serif; --mono:"JetBrains Mono",monospace;
}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;height:100%;overflow:hidden;}
body{background:var(--space);color:var(--ink);font-family:var(--body);font-size:14px;height:100vh;-webkit-font-smoothing:antialiased;}
/* starfield */
.app{position:relative;height:100vh;display:grid;grid-template-columns:228px 1fr 360px;}
.app::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
   radial-gradient(60% 50% at 50% 50%, rgba(86,224,224,.07), transparent 60%),
   radial-gradient(2px 2px at 20% 30%,#fff,transparent),radial-gradient(1px 1px at 70% 60%,#cfe0ff,transparent),
   radial-gradient(1.5px 1.5px at 40% 80%,#fff,transparent),radial-gradient(1px 1px at 85% 25%,#9fd,transparent),
   radial-gradient(1px 1px at 55% 15%,#fff,transparent),radial-gradient(1.5px 1.5px at 10% 70%,#bcd,transparent),
   linear-gradient(160deg,var(--space),var(--space2));
  background-repeat:no-repeat;opacity:.9;}

/* left rail: combs */
.rail{position:relative;z-index:2;border-right:1px solid var(--line);background:rgba(8,11,26,.6);backdrop-filter:blur(4px);
  display:flex;flex-direction:column;min-height:0;}
.rail__h{padding:18px 16px 10px;}
.rail__h .t{font-family:var(--disp);font-size:16px;letter-spacing:.5px;}
.rail__h .s{font-family:var(--mono);font-size:9.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--cyan);margin-top:4px;}
.rsearch{margin:6px 12px 8px;display:flex;align-items:center;gap:7px;background:rgba(0,0,0,.3);border:1px solid var(--edge);border-radius:10px;padding:0 10px;}
.rsearch input{flex:1;background:none;border:0;color:var(--ink);font:inherit;font-size:13px;padding:8px 0;outline:none;}
.rsearch svg{width:14px;height:14px;color:var(--cyan);}
.clist{flex:1;overflow:auto;padding:0 8px 16px;}
.crow{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:9px;cursor:pointer;font-size:13px;transition:.12s;}
.crow:hover{background:rgba(120,150,255,.08);}
.crow.on{background:linear-gradient(90deg,rgba(86,224,224,.2),transparent);box-shadow:inset 2px 0 0 var(--cyan);}
.crow .nm{flex:1;}
.crow .ct{font-family:var(--mono);font-size:11px;color:var(--muted);}
.crow.rare .ct{color:var(--mag);}

.stage{position:relative;z-index:1;overflow:hidden;}
#cy{width:100%;height:100%;}
.tools{position:absolute;right:14px;top:12px;z-index:5;display:flex;gap:8px;}
.tbtn{font:inherit;font-size:12px;font-weight:600;color:var(--ink);background:rgba(16,20,44,.8);border:1px solid var(--edge);
  padding:8px 12px;border-radius:10px;cursor:pointer;backdrop-filter:blur(4px);}
.tbtn:hover{border-color:var(--cyan);}
.legend{position:absolute;left:14px;bottom:14px;z-index:5;font-size:11.5px;color:var(--muted);display:flex;gap:14px;
  background:rgba(8,11,26,.7);padding:8px 14px;border-radius:999px;border:1px solid var(--line);backdrop-filter:blur(4px);}
.legend i{width:10px;height:10px;border-radius:50%;display:inline-block;vertical-align:-1px;margin-right:5px;}

aside{position:relative;z-index:2;border-left:1px solid var(--line);background:rgba(8,11,26,.6);backdrop-filter:blur(4px);overflow-y:auto;padding:18px;}
.empty{color:var(--dim);text-align:center;padding:80px 12px;}
.empty .o{font-size:38px;display:block;margin-bottom:12px;color:var(--cyan);text-shadow:0 0 20px var(--cyan);}
.ptitle{font-family:var(--disp);font-size:20px;letter-spacing:.3px;display:flex;align-items:center;gap:10px;line-height:1.1;}
.psrc{font-family:var(--mono);font-size:9px;font-weight:700;padding:3px 7px;border-radius:6px;}
.psrc.F{background:var(--f);color:#04231a;}.psrc.E{background:var(--e);color:#2a0f04;}
.plat{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px;}
.sect{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--cyan);margin:20px 0 9px;display:flex;gap:9px;align-items:center;}
.sect::after{content:"";flex:1;height:1px;background:var(--line);}
.rec{display:flex;align-items:center;gap:8px;padding:6px 0;flex-wrap:wrap;}
.par{padding:4px 10px;border-radius:9px;background:rgba(86,224,224,.1);border:1px solid var(--edge);font-weight:600;font-size:13px;cursor:pointer;}
.par:hover{background:rgba(86,224,224,.22);border-color:var(--cyan);}
.par.wild{background:rgba(91,102,153,.14);color:var(--muted);font-style:italic;cursor:default;}
.x{color:var(--mag);font-weight:800;}
.ch{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--ice);}
.rnone{color:var(--dim);font-style:italic;font-size:13px;}
.pr{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--edge);border-radius:10px;margin-bottom:7px;background:rgba(0,0,0,.2);}
.pr .nm{flex:1;font-weight:600;}.pr .pct{font-family:var(--mono);font-weight:700;color:var(--cyan);}
.pr.sp{border-color:var(--mag);}.pr .star{color:var(--mag);}
.bee{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--edge);border-radius:10px;margin-bottom:7px;cursor:pointer;background:rgba(0,0,0,.2);}
.bee:hover{border-color:var(--cyan);}.bee .nm{flex:1;font-weight:600;}.bee .pct{font-family:var(--mono);font-weight:700;color:var(--cyan);}
</style>
</head>
<body>
<div class="app">
  <nav class="rail">
    <div class="rail__h"><div class="t">СОЗВЕЗДИЕ</div><div class="s">соты · пчёлы</div></div>
    <label class="rsearch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg><input id="cq" placeholder="фильтр сот…"></label>
    <div class="clist" id="clist"></div>
  </nav>
  <div class="stage">
    <div class="tools"><button class="tbtn" id="fit">Вписать</button><button class="tbtn" id="clear">Сброс</button></div>
    <div id="cy"></div>
    <div class="legend"><span><i style="background:#3fd6a0"></i>Forestry</span><span><i style="background:#ff8a5c"></i>ExtraBees</span><span><i style="background:#ffd47a;box-shadow:0 0 8px #ffd47a"></i>даёт выбранную соту</span><span>кольца = глубина выведения</span></div>
  </div>
  <aside id="panel"><div class="empty"><span class="o">✦</span>Выбери соту слева — её производители вспыхнут в созвездии вместе с цепочками выведения.</div></aside>
</div>

<script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<script src="bees-data.js"></script>
<script>
const BY=Object.fromEntries(BEES.map(b=>[b.id,b]));
const isComb=n=>/сот/i.test(n);
const REAL=new Set(BEES.map(b=>b.id));
// глубина выведения (для колец)
const depthMemo={};
function depth(id,stack){stack=stack||new Set(); if(depthMemo[id]!=null)return depthMemo[id];
  const b=BY[id]; if(!b||!b.par.length){return depthMemo[id]=0;} if(stack.has(id))return 0; stack.add(id);
  let mx=0; for(const[p1,p2]of b.par)for(const p of[p1,p2])if(REAL.has(p))mx=Math.max(mx,depth(p,stack)+1);
  stack.delete(id); return depthMemo[id]=mx;}
const maxD=Math.max(...BEES.map(b=>depth(b.id)));
function ancestors(id,acc){acc=acc||new Set();const b=BY[id];if(!b)return acc;
  for(const[p1,p2]of b.par)for(const p of[p1,p2])if(REAL.has(p)&&!acc.has(p)){acc.add(p);ancestors(p,acc);}return acc;}

const nodes=BEES.map(b=>({data:{id:b.id,label:b.id,src:b.src,d:depth(b.id),
  sz:8+Math.min(18,b.prod.filter(p=>isComb(p[0])).length*4)}}));
const edges=[];const seen=new Set();
for(const b of BEES)for(const[p1,p2]of b.par)for(const p of[p1,p2])if(REAL.has(p)){const id=p+'>'+b.id;if(!seen.has(id)){seen.add(id);edges.push({data:{id,source:p,target:b.id}});}}

const COMBS={};for(const b of BEES)for(const[nm,pct,sp]of b.prod)if(isComb(nm))(COMBS[nm]||=[]).push({bee:b.id,pct,sp});
const combNames=Object.keys(COMBS).sort((a,b)=>COMBS[a].length-COMBS[b].length||a.localeCompare(b,'ru'));

const cy=cytoscape({container:document.getElementById('cy'),elements:{nodes,edges},
  wheelSensitivity:.22,minZoom:.06,maxZoom:2.4,
  style:[
    {selector:'node',style:{'label':'data(label)','width':'data(sz)','height':'data(sz)','background-color':'#2a3566',
      'border-width':1.5,'border-color':'#5a6bb0','color':'#cdd8ff','font-family':'Manrope,sans-serif','font-size':9,
      'font-weight':600,'text-valign':'center','text-halign':'right','text-margin-x':3,'text-max-width':90,'text-wrap':'wrap',
      'min-zoomed-font-size':7,'transition-property':'opacity,border-color,border-width,background-color','transition-duration':'180ms'}},
    {selector:'node[src="F"]',style:{'background-color':'#1f5a47','border-color':'#3fd6a0'}},
    {selector:'node[src="E"]',style:{'background-color':'#5a3322','border-color':'#ff8a5c'}},
    {selector:'edge',style:{'width':1,'line-color':'#34407a','curve-style':'straight','opacity':.4,'target-arrow-shape':'none'}},
    {selector:'.dim',style:{'opacity':.05}},
    {selector:'node.lit',style:{'border-color':'#8fb6ff','border-width':2,'background-color':'#33407a'}},
    {selector:'node.prod',style:{'border-color':'#ffd47a','border-width':3,'background-color':'#6a531a',
      'shadow-blur':26,'shadow-color':'#ffd47a','shadow-opacity':1,'shadow-offset-x':0,'shadow-offset-y':0,'color':'#fff'}},
    {selector:'edge.lit',style:{'line-color':'#8fb6ff','opacity':.9,'width':1.8}},
    {selector:'node.sel',style:{'border-color':'#fff','border-width':3}},
  ],
  layout:{name:'concentric',concentric:n=>maxD-n.data('d'),levelWidth:()=>1,minNodeSpacing:18,spacingFactor:.9}
});

const panel=document.getElementById('panel');
function recHTML(id){const b=BY[id];if(!b)return'';if(!b.par.length)return'<div class="rnone">дикая — из ульев</div>';
  return b.par.map(([p1,p2,ch])=>{const mk=p=>REAL.has(p)?`<span class="par" data-b="${p}">${p}</span>`:`<span class="par wild">${p}</span>`;
    return `<div class="rec">${mk(p1)}<span class="x">×</span>${mk(p2)}<span class="ch">@${ch}%</span></div>`;}).join('');}
function lineage(id){const anc=ancestors(id);anc.add(id);
  cy.batch(()=>{cy.elements().addClass('dim').removeClass('lit prod');
    anc.forEach(a=>cy.getElementById(a).removeClass('dim').addClass('lit'));
    cy.getElementById(id).removeClass('lit');
    cy.edges().forEach(e=>{if(anc.has(e.data('source'))&&anc.has(e.data('target')))e.removeClass('dim').addClass('lit');});});}
function showBee(id){const b=BY[id];if(!b)return;cy.elements().removeClass('sel');cy.getElementById(id).addClass('sel');lineage(id);
  const prods=b.prod.map(([nm,c,s])=>`<div class="pr${s?' sp':''}"><span class="nm">${nm}</span>${s?'<span class="star">✦</span>':''}<span class="pct">${c}%</span></div>`).join('');
  panel.innerHTML=`<div class="ptitle"><span class="psrc ${b.src}">${b.src==='F'?'FOR':'EXB'}</span>${b.id}</div><div class="plat">${b.en} · глубина ${depth(id)}</div>
    <div class="sect">как вывести</div>${recHTML(id)}<div class="sect">продукция</div>${prods||'—'}`;
  panel.querySelectorAll('.par[data-b]').forEach(e=>e.onclick=()=>showBee(e.dataset.b));}
function showComb(name,row){document.querySelectorAll('.crow.on').forEach(c=>c.classList.remove('on'));row&&row.classList.add('on');
  const prod=COMBS[name].slice().sort((a,b)=>b.pct-a.pct);const keep=new Set();
  prod.forEach(p=>{keep.add(p.bee);ancestors(p.bee).forEach(a=>keep.add(a));});
  cy.batch(()=>{cy.elements().addClass('dim').removeClass('lit prod sel');
    keep.forEach(k=>cy.getElementById(k).removeClass('dim').addClass('lit'));
    prod.forEach(p=>cy.getElementById(p.bee).removeClass('lit').addClass('prod'));
    cy.edges().forEach(e=>{if(keep.has(e.data('source'))&&keep.has(e.data('target')))e.removeClass('dim').addClass('lit');});});
  const list=prod.map(p=>`<div class="bee" data-b="${p.bee}"><span class="psrc ${BY[p.bee].src}">${BY[p.bee].src==='F'?'F':'E'}</span><span class="nm">${p.bee}</span><span class="pct">${p.pct}%${p.sp?'✦':''}</span></div>`).join('');
  panel.innerHTML=`<div class="ptitle">✦ ${name}</div><div class="plat">${prod.length} пчёл · цепочки подсвечены</div><div class="sect">производители</div>${list}`;
  panel.querySelectorAll('.bee').forEach(e=>e.onclick=()=>showBee(e.dataset.b));}

const clist=document.getElementById('clist');
function renderClist(f=''){f=f.trim().toLowerCase();clist.innerHTML='';
  combNames.filter(n=>!f||n.toLowerCase().includes(f)).forEach(nm=>{const r=document.createElement('div');
    r.className='crow'+(COMBS[nm].length<=1?' rare':'');
    r.innerHTML=`<span class="nm">${nm.replace(/ соты$/,'')}</span><span class="ct">${COMBS[nm].length}</span>`;
    r.onclick=()=>showComb(nm,r);clist.appendChild(r);});}
renderClist();
document.getElementById('cq').addEventListener('input',e=>renderClist(e.target.value));
cy.on('tap','node',e=>showBee(e.target.id()));
document.getElementById('fit').onclick=()=>cy.fit(50);
document.getElementById('clear').onclick=()=>{cy.elements().removeClass('dim lit prod sel');document.querySelectorAll('.crow.on').forEach(c=>c.classList.remove('on'));
  panel.innerHTML='<div class="empty"><span class="o">✦</span>Выбери соту слева.</div>';};
cy.ready(()=>cy.fit(50));
</script>
</body>
</html>
