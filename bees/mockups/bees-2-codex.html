<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Пасечный кодекс · Соты</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,800;0,900;1,500&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#efe7d6; --paper2:#e6dcc6; --card:#f7f1e3; --ink:#2a2118; --ink2:#4a3d2c;
  --rule:#cdbf9f; --rule-dk:#b6a279;
  --rust:#a8431f; --rust-dk:#7c2f12; --forest:#33614a; --gold:#b07d22;
  --muted:#7a6b52; --dim:#9c8c70;
  --disp:"Playfair Display",Georgia,serif; --body:"Spectral",Georgia,serif; --mono:"JetBrains Mono",monospace;
}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{
  background:var(--paper);
  background-image:
    radial-gradient(80% 60% at 50% -10%, rgba(176,125,34,.10), transparent 60%),
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.05'/></svg>");
  color:var(--ink); font-family:var(--body); font-size:16px; line-height:1.55; min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.sheet{max-width:1180px;margin:0 auto;padding:0 30px 70px;}

/* ===== masthead ===== */
.mast{padding:34px 0 18px;border-bottom:3px double var(--rule-dk);text-align:center;position:relative;}
.mast__kick{font-family:var(--mono);font-size:11px;letter-spacing:.42em;text-transform:uppercase;color:var(--rust);}
.mast h1{font-family:var(--disp);font-weight:900;font-size:60px;letter-spacing:-1px;margin:6px 0 2px;line-height:.92;}
.mast h1 em{font-style:italic;color:var(--rust);font-weight:800;}
.mast__line{font-family:var(--body);font-style:italic;font-size:16px;color:var(--ink2);}
.mast__meta{display:flex;justify-content:center;gap:30px;margin-top:14px;font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.mast__meta b{color:var(--rust-dk);font-size:15px;}

/* ===== layout ===== */
.cols{display:grid;grid-template-columns:336px 1fr;gap:0;margin-top:26px;border:1px solid var(--rule);background:var(--card);
  box-shadow:0 24px 60px rgba(60,40,15,.16);}
@media(max-width:900px){.cols{grid-template-columns:1fr;}}

/* index */
.index{border-right:1px solid var(--rule);padding:18px 0;max-height:78vh;overflow:auto;}
.index__search{margin:0 18px 10px;display:flex;align-items:center;gap:8px;border:1px solid var(--rule-dk);border-radius:2px;padding:0 12px;background:var(--paper);}
.index__search input{flex:1;border:0;background:none;font:inherit;font-size:15px;padding:10px 0;color:var(--ink);outline:none;}
.index__search input::placeholder{color:var(--dim);}
.index__search svg{width:16px;height:16px;color:var(--rust);}
.idx-sectoggle{display:flex;gap:6px;margin:0 18px 12px;}
.idx-sectoggle button{flex:1;font:inherit;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;
  padding:7px;border:1px solid var(--rule-dk);background:var(--paper);color:var(--muted);cursor:pointer;border-radius:2px;}
.idx-sectoggle button.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.idx-item{display:flex;align-items:baseline;gap:10px;padding:8px 18px;cursor:pointer;border-left:3px solid transparent;transition:.12s;}
.idx-item:hover{background:rgba(176,125,34,.09);}
.idx-item.sel{background:rgba(168,67,31,.10);border-left-color:var(--rust);}
.idx-num{font-family:var(--mono);font-size:11px;color:var(--dim);min-width:26px;}
.idx-name{flex:1;font-weight:500;font-size:15.5px;}
.idx-name .x4{font-size:11px;color:var(--rust);}
.idx-count{font-family:var(--mono);font-size:12px;color:var(--muted);}
.idx-rare{color:var(--rust);font-weight:700;}

/* specimen */
.spec{padding:30px 36px;min-height:520px;}
.spec__empty{color:var(--dim);font-style:italic;text-align:center;padding:120px 20px;font-size:18px;}
.spec__empty .o{font-family:var(--disp);font-size:50px;color:var(--rule-dk);font-style:normal;display:block;margin-bottom:10px;}
.spec__head{display:flex;align-items:flex-start;gap:18px;border-bottom:1px solid var(--rule);padding-bottom:16px;}
.spec__plate{width:66px;height:74px;flex:none;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
  background:repeating-linear-gradient(60deg,var(--gold),var(--gold) 6px,#c79433 6px,#c79433 12px);
  box-shadow:inset 0 0 0 3px rgba(0,0,0,.12);}
.spec__no{font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:var(--rust);text-transform:uppercase;}
.spec__title{font-family:var(--disp);font-weight:800;font-size:38px;line-height:1;margin:4px 0;}
.spec__lat{font-style:italic;color:var(--muted);font-size:15px;}
.spec__note{margin:16px 0 6px;font-size:15.5px;color:var(--ink2);}
.spec__note .drop{float:left;font-family:var(--disp);font-weight:800;font-size:52px;line-height:.7;padding:6px 10px 0 0;color:var(--rust);}

.sectit{font-family:var(--mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--rust-dk);
  margin:26px 0 4px;display:flex;align-items:center;gap:12px;}
.sectit::after{content:"";flex:1;height:1px;background:var(--rule);}

/* producers as catalog entries */
.entry{padding:13px 0;border-bottom:1px dotted var(--rule-dk);}
.entry__head{display:flex;align-items:baseline;gap:10px;cursor:pointer;}
.entry__src{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.08em;padding:2px 6px;border-radius:2px;}
.s-F{background:var(--forest);color:#eaf3ee;}.s-E{background:var(--rust);color:#f7e7df;}
.entry__nm{flex:1;font-family:var(--disp);font-weight:700;font-size:19px;}
.entry__nm small{font-family:var(--body);font-style:italic;font-weight:400;font-size:13px;color:var(--muted);}
.entry__yield{font-family:var(--mono);font-weight:700;font-size:15px;color:var(--rust-dk);}
.entry__yield .bar{display:inline-block;height:7px;border-radius:1px;background:var(--rust);vertical-align:middle;margin-right:7px;}
.entry__body{display:none;padding:11px 0 4px 4px;}
.entry.open .entry__body{display:block;}
.recipe{font-size:15px;}
.recipe-line{display:flex;align-items:center;gap:9px;padding:3px 0;flex-wrap:wrap;}
.cross{font-family:var(--disp);font-style:italic;color:var(--rust);font-size:18px;}
.parent{border-bottom:1px solid var(--rust);cursor:pointer;font-weight:500;}
.parent:hover{color:var(--rust);}
.parent.wild{border-bottom:1px dotted var(--dim);color:var(--muted);font-style:italic;cursor:default;}
.r-ch{margin-left:auto;font-family:var(--mono);font-size:13px;color:var(--muted);}
.r-none{font-style:italic;color:var(--dim);font-size:14px;}
.allprod{margin-top:8px;font-size:14px;color:var(--ink2);}
.allprod b{font-family:var(--mono);font-weight:700;font-size:12px;color:var(--rust-dk);}
.colophon{text-align:center;font-style:italic;color:var(--muted);font-size:13px;margin-top:24px;}
</style>
</head>
<body>
<div class="sheet">
  <div class="mast">
    <div class="mast__kick">Forestry · Binnie ExtraBees</div>
    <h1>Пасечный <em>кодекс</em></h1>
    <div class="mast__line">определитель сот: что приносит каждая пчела и как её вывести</div>
    <div class="mast__meta">
      <span><b id="n-combs">—</b> видов сот</span>
      <span><b id="n-bees">—</b> пчёл</span>
      <span><b id="n-mut">—</b> скрещиваний</span>
    </div>
  </div>

  <div class="cols">
    <nav class="index">
      <label class="index__search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input id="q" type="search" placeholder="Найти соту или пчелу…">
      </label>
      <div class="idx-sectoggle">
        <button class="on" data-m="comb">Соты</button>
        <button data-m="bee">Пчёлы</button>
      </div>
      <div id="idx"></div>
    </nav>
    <section class="spec" id="spec">
      <div class="spec__empty"><span class="o">⬡</span>Выберите соту из определителя слева.</div>
    </section>
  </div>
  <div class="colophon">Извлечено из jar-модов · макет №2 «Пасечный кодекс»</div>
</div>

<script src="bees-data.js"></script>
<script>
const BY=Object.fromEntries(BEES.map(b=>[b.id,b]));
const isComb=n=>/сот/i.test(n);
const COMBS={};
for(const b of BEES) for(const [nm,pct,sp] of b.prod)
  (COMBS[nm] ||= {name:nm,prod:[]}).prod.push({bee:b.id,src:b.src,pct,sp});
const combList=Object.values(COMBS).filter(c=>isComb(c.name))
  .sort((a,b)=>a.name.localeCompare(b.name,'ru'));
const muts=BEES.reduce((s,b)=>s+b.par.length,0);
n_combs.textContent=combList.length; n_bees.textContent=BEES.length; n_mut.textContent=muts;

const idx=document.getElementById('idx'), spec=document.getElementById('spec');
let mode='comb', sel=null;

function renderIdx(f=''){
  f=f.trim().toLowerCase(); idx.innerHTML='';
  let items;
  if(mode==='comb'){
    items=combList.filter(c=>!f||c.name.toLowerCase().includes(f)||c.prod.some(p=>p.bee.toLowerCase().includes(f)))
      .map((c,i)=>({key:c.name,name:c.name,count:c.prod.length}));
  }else{
    items=BEES.filter(b=>!f||b.id.toLowerCase().includes(f)||b.en.toLowerCase().includes(f))
      .sort((a,b)=>a.id.localeCompare(b.id,'ru'))
      .map(b=>({key:b.id,name:b.id,count:b.prod.filter(p=>isComb(p[0])).length,bee:1}));
  }
  items.forEach((it,i)=>{
    const el=document.createElement('div'); el.className='idx-item'+(sel===it.key?' sel':'');
    el.innerHTML=`<span class="idx-num">${String(i+1).padStart(2,'0')}</span>
      <span class="idx-name">${it.name}</span>
      <span class="idx-count${it.count<=1&&mode==='comb'?' idx-rare':''}">${it.count}${mode==='comb'?'✦':'§'}</span>`;
    el.onclick=()=> mode==='comb'?showComb(it.key):showBee(it.key);
    idx.appendChild(el);
  });
  if(!items.length) idx.innerHTML='<div style="padding:18px;color:var(--dim);font-style:italic">Ничего не найдено</div>';
}

function recipe(id){
  const b=BY[id]; if(!b) return '<div class="r-none">сведений нет</div>';
  if(!b.par.length) return '<div class="r-none">дикая пчела — добывается из ульев в мире</div>';
  return '<div class="recipe">'+b.par.map(([p1,p2,ch])=>{
    const mk=p=>BY[p]?`<span class="parent" data-b="${p}">${p}</span>`:`<span class="parent wild">${p}</span>`;
    return `<div class="recipe-line">${mk(p1)}<span class="cross">×</span>${mk(p2)}<span class="r-ch">шанс ${ch}%</span></div>`;
  }).join('')+'</div>';
}
function prodLine(b){
  return b.prod.map(([n,c,s])=>`${n} <b>${c}%${s?'✦':''}</b>`).join(' · ');
}

function showComb(name){
  mode='comb'; sel=name; renderIdx(document.getElementById('q').value);
  const c=COMBS[name]; const list=c.prod.slice().sort((a,b)=>b.pct-a.pct);
  const no=String(combList.findIndex(x=>x.name===name)+1).padStart(3,'0');
  spec.innerHTML=`
    <div class="spec__head">
      <div class="spec__plate"></div>
      <div>
        <div class="spec__no">образец № ${no}</div>
        <div class="spec__title">${name}</div>
        <div class="spec__lat">источников: ${list.length} ${list.length===1?'(редкая)':''}</div>
      </div>
    </div>
    <p class="spec__note"><span class="drop">${name[0]}</span>Эту соту приносят ${list.length} ${list.length===1?'пчела':'видов пчёл'}. Ниже — каждый источник с шансом выпадения; разверните запись, чтобы увидеть рецепт выведения пчелы.</p>
    <div class="sectit">Производители</div>
    ${list.map((p,i)=>{
      const b=BY[p.bee];
      return `<div class="entry" data-b="${p.bee}">
        <div class="entry__head">
          <span class="entry__src s-${p.src}">${p.src==='F'?'FOR':'EXB'}</span>
          <span class="entry__nm">${p.bee} <small>${b?b.en:''}</small></span>
          <span class="entry__yield"><span class="bar" style="width:${Math.max(6,p.pct*0.9)}px"></span>${p.pct}%${p.sp?'✦':''}</span>
        </div>
        <div class="entry__body">
          <div class="sectit" style="margin-top:4px">Выведение</div>
          ${recipe(p.bee)}
          <div class="allprod">— вся продукция: ${b?prodLine(b):'—'}</div>
        </div>
      </div>`;
    }).join('')}`;
  bind();
}

function showBee(id){
  sel=id; if(mode==='bee') renderIdx(document.getElementById('q').value);
  const b=BY[id];
  spec.innerHTML=`
    <div class="spec__head">
      <div class="spec__plate" style="background:repeating-linear-gradient(60deg,${b.src==='F'?'#33614a,#33614a 6px,#27503b 6px,#27503b 12px':'#a8431f,#a8431f 6px,#8a3517 6px,#8a3517 12px'})"></div>
      <div>
        <div class="spec__no">${b.src==='F'?'Forestry':'ExtraBees'} · пчела</div>
        <div class="spec__title">${b.id}</div>
        <div class="spec__lat">${b.en}</div>
      </div>
    </div>
    <div class="sectit">Выведение</div>
    ${recipe(id)}
    <div class="sectit">Продукция</div>
    <p class="spec__note" style="margin-top:8px">${prodLine(b)||'—'}</p>`;
  spec.querySelectorAll('.parent[data-b]').forEach(el=>el.onclick=()=>showBee(el.dataset.b));
}

function bind(){
  spec.querySelectorAll('.entry').forEach(e=>{
    e.querySelector('.entry__head').onclick=()=>e.classList.toggle('open');
    e.querySelectorAll('.parent[data-b]').forEach(el=>el.onclick=ev=>{ev.stopPropagation();showBee(el.dataset.b);});
  });
}

document.querySelectorAll('.idx-sectoggle button').forEach(btn=>btn.onclick=()=>{
  document.querySelectorAll('.idx-sectoggle button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); mode=btn.dataset.m; sel=null; renderIdx(document.getElementById('q').value);
});
document.getElementById('q').addEventListener('input',e=>renderIdx(e.target.value));
renderIdx();
</script>
</body>
</html>
